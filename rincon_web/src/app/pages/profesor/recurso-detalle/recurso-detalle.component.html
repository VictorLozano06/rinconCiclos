<section class="recurso-detalle" *ngIf="!cargando && recurso">
  <p class="ruta-detalle" *ngIf="breadcrumbTexto">{{ breadcrumbTexto }}</p>

  <div class="cabecera-detalle">
    <p class="categoria-detalle">{{ recurso.categoriaNombre }}</p>
    <h1 class="titulo-detalle">{{ recurso.nombre }}</h1>
    <p class="descripcion-detalle">{{ recurso.descripcion }}</p>
    <p *ngIf="obtenerCiclos().length > 0" class="ciclos-detalle">
      Ciclos: {{ obtenerCiclos().join(' - ') }}
    </p>
  </div>

  <div class="bloque-detalle" *ngIf="obtenerEnlaces().length > 0">
    <h2>Enlaces</h2>
    <div class="lista-simple">
      <a *ngFor="let enlace of obtenerEnlaces()" [href]="enlace" target="_blank" rel="noopener noreferrer">
        {{ enlace }}
      </a>
    </div>
  </div>

  <div class="bloque-detalle" *ngIf="obtenerArchivos().length > 0">
    <h2>Archivos</h2>
    <div class="lista-simple">
      <a *ngFor="let archivo of obtenerArchivos()" [href]="archivo" download>
        {{ getNombreArchivo(archivo) }}
      </a>
    </div>
  </div>
</section>

<section class="recurso-detalle" *ngIf="cargando">
  <div class="mensaje-estado">Cargando detalle del recurso...</div>
</section>

<section class="recurso-detalle" *ngIf="errorCarga">
  <div class="mensaje-estado">{{ mensajeError }}</div>
</section>
