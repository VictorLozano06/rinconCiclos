<section class="seccion-recursos">
  <div class="cabecera-seccion-categoria mb-4">
    <h2 class="titulo-seccion text-capitalize">{{ section }}</h2>
    <p *ngIf="subsection" class="ruta-seccion mt-2">
      Subcategoría: <span class="badge bg-primary text-uppercase px-3 py-2 fs-6">{{ subsection }}</span>
    </p>
  </div>

  <div class="card shadow-sm border-0 p-5 text-center bg-white rounded-4">
    <div class="card-body">
      <i class="bi bi-folder2-open text-muted fs-1 mb-3"></i>
      <h4 class="card-title text-secondary">Categoría sin recursos</h4>
      <p class="card-text text-muted">Aún no se han publicado actas, convocatorias ni documentos en esta sección.</p>
    </div>
  </div>
</section>
