<section class="seccion-recursos">
  <h2 class="titulo-seccion">Mis recursos recientes</h2>

  <div *ngIf="cargandoRecursos" class="card shadow-sm border-0 p-4 text-center bg-white rounded-4">
    <div class="card-body">
      <p class="text-muted mb-0">Cargando recursos...</p>
    </div>
  </div>

  <div *ngIf="errorRecursos" class="card shadow-sm border-0 p-4 text-center bg-white rounded-4">
    <div class="card-body">
      <h4 class="card-title text-secondary">No se han podido cargar los recursos</h4>
      <p class="card-text text-muted mb-0">Revisa la conexion con la API de PHP y vuelve a intentarlo.</p>
    </div>
  </div>

  <div *ngIf="!cargandoRecursos && !errorRecursos && recursosRecientes.length; else sinRecursos" class="lista-recursos">
    <app-recurso-item
      *ngFor="let recurso of recursosRecientes"
      [categoria]="recurso.categoriaNombre"
      [fechaPublicacion]="recurso.fechaPublicacion"
      [nombre]="recurso.nombre"
      [descripcion]="recurso.descripcion"
      [curso]="formatearCurso(recurso)"
      [ciclos]="formatearCiclos(recurso)"
      [detalleRuta]="['/profesor', 'recurso', recurso.idCategoria, recurso.numRecurso]">
    </app-recurso-item>
  </div>

  <ng-template #sinRecursos>
    <div *ngIf="!cargandoRecursos && !errorRecursos" class="card shadow-sm border-0 p-5 text-center bg-white rounded-4">
      <div class="card-body">
        <i class="bi bi-folder2-open text-muted fs-1 mb-3"></i>
        <h4 class="card-title text-secondary">No hay recursos publicados</h4>
        <p class="card-text text-muted mb-0">Cuando haya recursos cargados en la base de datos apareceran aqui.</p>
      </div>
    </div>
  </ng-template>
</section>
