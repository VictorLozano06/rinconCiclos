<div class="diseno-app">
  <div
    class="sidebar-overlay"
    [class.sidebar-overlay-visible]="sidebarOpen"
    (click)="closeSidebar()"></div>

  <div class="sidebar-shell" [class.sidebar-shell-open]="sidebarOpen">
    <app-sidebar-coordinador
      [mobileOpen]="sidebarOpen"
      (requestClose)="closeSidebar()" />
  </div>

  <main class="contenedor-principal">
    <header class="barra-superior">
      <button
        type="button"
        class="boton-sidebar"
        (click)="toggleSidebar()"
        [attr.aria-label]="sidebarOpen ? 'Cerrar menu lateral' : 'Abrir menu lateral'">
        <i class="bi bi-list"></i>
      </button>

      <app-buscador />
    </header>

    <div class="contenedor-contenido">
      <div class="ajuste-ancho">
        <router-outlet />
      </div>
    </div>
  </main>
</div>
