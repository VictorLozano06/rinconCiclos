<div class="header-container d-flex justify-content-between align-items-start mb-4">
  <div>
    <h2 class="fw-bold text-dark m-0">Gestión de Grupos Participantes</h2>
    <p class="text-secondary small">Listado y gestión de grupos.</p>
  </div>
  <button class="btn btn-dark btn-sm px-3 fw-bold rounded-1 text-uppercase btn-nuevo"
    (click)="mostrarModalNuevo = true">
    + NUEVO GRUPO
  </button>
</div>

<div class="list-container">
  <div *ngIf="grupos.length === 0" class="card border-0 shadow-sm rounded-3 mb-3">
    <div class="card-body p-5 text-center text-muted">
      <i class="bi bi-info-circle me-2"></i> No existen grupos participantes registrados en el sistema.
    </div>
  </div>

  <div *ngFor="let grupo of grupos" class="card border-0 shadow-sm rounded-3 mb-3">
    <div class="card-body p-3 d-flex align-items-center justify-content-between px-4">
      <div class="d-flex align-items-center gap-3">
        <i class="bi bi-people-fill text-secondary fs-5"></i>
        <h6 class="m-0 fw-bold text-dark">
          {{ grupo.nombre }}
        </h6>
      </div>

      <div class="d-flex gap-2">
        <button class="btn btn-outline-secondary btn-sm d-flex align-items-center gap-2 px-3 action-btn"
          (click)="abrirEditar(grupo)">
          <i class="bi bi-pencil-fill small"></i>
          <span class="text-uppercase small fw-bold">editar</span>
        </button>
        <button class="btn btn-outline-danger btn-sm d-flex align-items-center gap-2 px-3 action-btn delete-btn"
          (click)="abrirEliminar(grupo)">
          <i class="bi bi-trash-fill small"></i>
          <span class="text-uppercase small fw-bold">eliminar</span>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Modal Nuevo Grupo -->
<div *ngIf="mostrarModalNuevo" class="modal-overlay d-flex align-items-center justify-content-center">
  <div class="custom-modal rounded-3 shadow-lg p-4">
    <h5 class="text-white fw-bold mb-4">NUEVO GRUPO PARTICIPANTE</h5>

    <div class="mb-5">
      <label class="text-secondary x-small fw-bold text-uppercase mb-2 d-block label-spacing">Nombre del Grupo <span class="text-danger">*</span></label>
      <input type="text" class="form-control custom-input py-2" [class.is-invalid]="errorMensaje" placeholder="Ej. 1º GAD o Alumnos 2º DAW" [(ngModel)]="nuevoNombre" (ngModelChange)="errorMensaje = ''" (keyup.enter)="guardarNuevo()">
      <div *ngIf="errorMensaje" class="text-danger mt-2 small">{{ errorMensaje }}</div>
    </div>

    <div class="d-flex justify-content-end gap-3 mt-4">
      <button class="btn btn-link text-white text-decoration-none fw-bold text-uppercase px-4 btn-cancel"
        (click)="mostrarModalNuevo = false; nuevoNombre = ''">
        CANCELAR
      </button>
      <button class="btn btn-white fw-bold text-uppercase px-4 btn-save" (click)="guardarNuevo()" [disabled]="!nuevoNombre.trim()">
        GUARDAR
      </button>
    </div>
  </div>
</div>

<!-- Modal Editar Grupo -->
<div *ngIf="mostrarModalEditar" class="modal-overlay d-flex align-items-center justify-content-center">
  <div class="custom-modal rounded-3 shadow-lg p-4">
    <h5 class="text-white fw-bold mb-4">EDITAR GRUPO</h5>

    <div class="mb-5">
      <label class="text-secondary x-small fw-bold text-uppercase mb-2 d-block label-spacing">Nombre del Grupo <span class="text-danger">*</span></label>
      <input type="text" class="form-control custom-input py-2" [class.is-invalid]="errorMensaje" [(ngModel)]="editarNombre" (ngModelChange)="errorMensaje = ''" (keyup.enter)="guardarEditar()">
      <div *ngIf="errorMensaje" class="text-danger mt-2 small">{{ errorMensaje }}</div>
    </div>

    <div class="d-flex justify-content-end gap-3 mt-4">
      <button class="btn btn-link text-white text-decoration-none fw-bold text-uppercase px-4 btn-cancel"
        (click)="mostrarModalEditar = false">
        CANCELAR
      </button>
      <button class="btn btn-white fw-bold text-uppercase px-4 btn-save" (click)="guardarEditar()" [disabled]="!editarNombre.trim()">
        GUARDAR
      </button>
    </div>
  </div>
</div>

<!-- Modal Confirmar Eliminación -->
<div *ngIf="mostrarModalConfirmar" class="modal-overlay d-flex align-items-center justify-content-center">
  <div class="custom-modal rounded-3 shadow-lg p-4" style="max-width: 420px;">
    <div class="d-flex align-items-center gap-3 mb-3">
      <div class="rounded-circle d-flex align-items-center justify-content-center"
        style="width:42px;height:42px;background:rgba(220,53,69,0.15);flex-shrink:0;">
        <i class="bi bi-trash-fill text-danger"></i>
      </div>
      <h5 class="text-white fw-bold m-0">Confirmar eliminación</h5>
    </div>

    <p class="text-secondary mb-5" style="font-size: 0.93rem;">{{ mensajeConfirmar }}</p>

    <div class="d-flex justify-content-end gap-3">
      <button class="btn btn-link text-white text-decoration-none fw-bold text-uppercase px-4 btn-cancel"
        (click)="mostrarModalConfirmar = false">
        CANCELAR
      </button>
      <button class="btn btn-danger fw-bold text-uppercase px-4" (click)="confirmarEliminar()">
        ELIMINAR
      </button>
    </div>
  </div>
</div>
