<aside class="barra-lateral" [class.barra-lateral-abierta]="mobileOpen">
  <div class="cabecera-sidebar">
    <h1 class="titulo-web">Rincon de Ciclos</h1>
    <p class="subtitulo-web">Portal Coordinacion</p>
    <button type="button" class="cerrar-sidebar" (click)="closeSidebar()" aria-label="Cerrar menu">
      <i class="bi bi-x-lg"></i>
    </button>
  </div>

  <nav class="navegacion-sidebar">
    <p *ngIf="errorCarga" class="estado-sidebar">
      No se pudieron cargar las categorias del backend.
    </p>

    <div *ngFor="let item of menuItems" class="grupo-navegacion">
      <a
        *ngIf="!hasChildren(item)"
        [routerLink]="item.ruta"
        (click)="closeSidebar()"
        routerLinkActive="enlace-activo"
        [routerLinkActiveOptions]="{ exact: true }"
        class="item-menu item-menu-enlace">
        <div class="contenido-item">
          <span class="icono-item">
            <img [src]="'assets/icons/' + item.icono + '.svg'" [alt]="item.nombre" class="imagen-icono">
          </span>
          <span class="texto-item">{{ item.nombre }}</span>
        </div>
      </a>

      <button
        *ngIf="hasChildren(item)"
        type="button"
        class="item-menu"
        (click)="toggleMenu(item)">
        <div class="contenido-item">
          <span class="icono-item">
            <img [src]="'assets/icons/' + item.icono + '.svg'" [alt]="item.nombre" class="imagen-icono">
          </span>
          <span class="texto-item">{{ item.nombre }}</span>
        </div>
        <i class="bi" [ngClass]="item.abierto ? 'bi-chevron-up' : 'bi-chevron-down'"></i>
      </button>

      <div *ngIf="item.abierto && hasChildren(item)" class="lista-subcategorias">
        <ng-container *ngFor="let categoria of item.subcategorias">
          <div class="categoria-bloque">
            <div class="categoria-fila">
              <a
                *ngIf="!categoria.deshabilitado"
                [routerLink]="categoria.ruta"
                (click)="closeSidebar()"
                routerLinkActive="enlace-activo"
                class="item-subcategoria item-subcategoria-principal">
                {{ categoria.nombre }}
              </a>

              <span
                *ngIf="categoria.deshabilitado"
                class="item-subcategoria item-subcategoria-principal sub-deshabilitada"
                title="Seccion en desarrollo">
                {{ categoria.nombre }}
              </span>

              <button
                *ngIf="hasChildren(categoria)"
                type="button"
                class="boton-subcategoria"
                (click)="toggleMenu(categoria)"
                [attr.aria-label]="'Mostrar subcategorias de ' + categoria.nombre">
                <i class="bi" [ngClass]="categoria.abierto ? 'bi-chevron-up' : 'bi-chevron-down'"></i>
              </button>
            </div>

            <div *ngIf="categoria.abierto && hasChildren(categoria)" class="lista-subcategorias lista-subcategorias-anidada">
              <ng-container *ngFor="let sub of categoria.subcategorias">
                <a
                  *ngIf="!sub.deshabilitado"
                  [routerLink]="sub.ruta"
                  (click)="closeSidebar()"
                  routerLinkActive="enlace-activo"
                  class="item-subcategoria">
                  {{ sub.nombre }}
                </a>

                <span
                  *ngIf="sub.deshabilitado"
                  class="item-subcategoria sub-deshabilitada"
                  title="Seccion en desarrollo">
                  {{ sub.nombre }}
                </span>
              </ng-container>
            </div>
          </div>
        </ng-container>
      </div>
    </div>
  </nav>
</aside>
