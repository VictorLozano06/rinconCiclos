<div class="tarjeta-recurso">
  <div class="info-recurso">
    <div class="etiqueta-recurso">
      <img src="assets/icons/tag.svg" alt="Etiqueta" class="icono-etiqueta">
      <span>{{ categoria }} • {{ fechaPublicacion | date:'dd/MM/yyyy' }}</span>
    </div>
    <h3 class="titulo-recurso">{{ nombre }}</h3>
    <p class="descripcion-recurso">{{ descripcion }}</p>
  </div>
  <div class="accion-recurso">
    <a *ngIf="detalleRuta; else enlaceExterno" [routerLink]="detalleRuta" class="boton-ver">
      <img src="assets/icons/arrow-circle.svg" alt="Ver" class="icono-accion">
      Ver recurso
    </a>
    <ng-template #enlaceExterno>
      <a *ngIf="enlace; else sinAccion" [href]="enlace" target="_blank" rel="noopener noreferrer" class="boton-ver">
        <img src="assets/icons/arrow-circle.svg" alt="Ver" class="icono-accion">
        Ver recurso
      </a>
    </ng-template>
    <ng-template #sinAccion>
      <span class="text-muted small">Sin vista disponible</span>
    </ng-template>
  </div>
</div>
