name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  web-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: rincon_web/package-lock.json
      - name: Install frontend dependencies
        run: npm install
        working-directory: rincon_web
      - name: Build frontend
        run: npm run build
        working-directory: rincon_web
